<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span class="header-title">集中モード</span>
  </div>

  <div class="toggle-section">
    <button id="toggleBtn" class="toggle-btn off">OFF</button>
    <div class="timer" id="timer" style="display: none;">
      <span class="timer-label">経過</span>
      <span class="timer-value" id="timerValue">00:00:00</span>
    </div>
  </div>

  <div class="section">
    <h2>ブロックリスト</h2>
    <div class="domain-input">
      <input type="text" id="domainInput" placeholder="例: example.com">
      <button id="addDomainBtn" class="btn-add">追加</button>
    </div>
    <p class="input-hint">カンマ・スペース区切りで一括追加できます</p>
    <ul id="domainList" class="domain-list"></ul>
  </div>

  <div class="section">
    <h2>ホワイトリスト</h2>
    <p class="section-desc">一部のサブドメインをホワイトリストとして登録することで、ブロック対象から除外できます。</p>
    <div class="domain-input">
      <input type="text" id="allowedInput" placeholder="例: white.example.com">
      <button id="addAllowedBtn" class="btn-add">追加</button>
    </div>
    <ul id="allowedList" class="domain-list"></ul>
  </div>

  <div class="section" id="tempAllowedSection" style="display: none;">
    <h2>一時許可中</h2>
    <ul id="tempAllowedList" class="domain-list"></ul>
  </div>

  <div class="section">
    <h2>履歴</h2>
    <ul id="historyList" class="history-list">
      <li class="empty-message">履歴はまだありません</li>
    </ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>集中モード</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="container">
    <h1>集中モード中です</h1>
    <p class="blocked-domain" id="blockedDomain"></p>
    <div class="timer-section">
      <p class="timer-label">経過時間</p>
      <p class="timer" id="timer">00:00:00</p>
    </div>
    <p class="message">このサイトはブロックされています。<br>作業に戻りましょう。</p>
    <button class="btn-temp-allow" id="tempAllowBtn">このサイトを一時許可する</button>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
